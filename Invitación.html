<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Una propuesta</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --rose:    #d4517a;
  --rose-lt: #e8829f;
  --cream:   #fdf6f0;
  --dark:    #1a0f14;
  --ink:     #3a2530;
  --muted:   #8a7580;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'DM Sans', sans-serif;
  background: var(--dark);
  overflow: hidden;
  cursor: default;
}

/* ─── Fondo sutil ─── */
.bg {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 70% at 30% 60%, #2e0d1f 0%, #1a0f14 55%, #0d0810 100%);
  z-index: 0;
}

.bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 70% 20%, rgba(212,81,122,.08) 0%, transparent 50%),
    radial-gradient(circle at 20% 80%, rgba(212,81,122,.05) 0%, transparent 40%);
}

/* partículas flotantes */
.petals { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
.petal {
  position: absolute;
  font-size: 18px;
  opacity: 0;
  animation: rise linear infinite;
}

@keyframes rise {
  0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
  8%   { opacity: .35; }
  92%  { opacity: .35; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ─── Card ─── */
.card {
  position: relative;
  z-index: 10;
  background: var(--cream);
  padding: 52px 44px 44px;
  border-radius: 24px;
  box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06);
  text-align: center;
  max-width: 380px;
  width: 92%;
  animation: appear .9s cubic-bezier(.22,1,.36,1) both;
}

@keyframes appear {
  from { opacity:0; transform: translateY(28px) scale(.96); }
  to   { opacity:1; transform: translateY(0)    scale(1);   }
}

.emoji-top {
  font-size: 40px;
  display: block;
  margin-bottom: 18px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--ink);
  letter-spacing: .02em;
  line-height: 1.3;
  margin-bottom: 10px;
}

.divider {
  width: 36px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent, var(--rose), transparent);
  margin: 14px auto 20px;
}

.message {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.9;
  font-weight: 300;
  margin-bottom: 22px;
}

.message em {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--rose);
}

/* plan pill list */
.plan {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 28px;
}

.plan-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(212,81,122,.06);
  border-radius: 50px;
  padding: 9px 16px;
  font-size: 13.5px;
  color: var(--ink);
  animation: slideIn .7s cubic-bezier(.22,1,.36,1) both;
}

.plan-row:nth-child(1) { animation-delay: .25s; }
.plan-row:nth-child(2) { animation-delay: .38s; }
.plan-row:nth-child(3) { animation-delay: .51s; }
.plan-row:nth-child(4) { animation-delay: .64s; }

@keyframes slideIn {
  from { opacity:0; transform: translateX(-14px); }
  to   { opacity:1; transform: translateX(0); }
}

.plan-row .dot {
  width: 6px; height: 6px;
  background: var(--rose-lt);
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── Botones ─── */
.btns {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

.btn-yes {
  padding: 14px 38px;
  background: linear-gradient(135deg, #d4517a, #a8304f);
  color: white;
  border: none;
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: .03em;
  box-shadow: 0 8px 28px rgba(168,48,79,.4);
  transition: transform .2s, box-shadow .2s;
  animation: pulseGlow 2.5s ease-in-out infinite;
}

@keyframes pulseGlow {
  0%,100% { box-shadow: 0 8px 28px rgba(168,48,79,.4); }
  50%      { box-shadow: 0 8px 40px rgba(168,48,79,.7); }
}

.btn-yes:hover {
  transform: scale(1.06) translateY(-2px);
  box-shadow: 0 12px 36px rgba(168,48,79,.6);
}

.btn-no {
  padding: 10px 20px;
  background: transparent;
  color: #ccc;
  border: 1px solid rgba(0,0,0,.1);
  border-radius: 50px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: color .2s;
  position: relative;   /* se vuelve fixed por JS */
  user-select: none;
  -webkit-user-select: none;
}

.hint {
  min-height: 18px;
  margin-top: 16px;
  font-size: 12px;
  color: var(--rose-lt);
  font-style: italic;
  opacity: 0;
  transition: opacity .4s;
}
.hint.show { opacity: 1; }

/* ─── Overlay sí ─── */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,5,12,.85);
  z-index: 200;
  justify-content: center;
  align-items: center;
}
#overlay.show { display: flex; animation: fdIn .5s ease both; }

@keyframes fdIn { from {opacity:0;} to {opacity:1;} }

.yes-card {
  background: var(--cream);
  border-radius: 24px;
  padding: 52px 40px;
  text-align: center;
  max-width: 360px;
  width: 90%;
  animation: pop .6s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes pop {
  from { transform: scale(.6); opacity:0; }
  to   { transform: scale(1);  opacity:1; }
}

.yes-card .big { font-size: 56px; display: block; margin-bottom: 14px; }

.yes-card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 12px;
}

.yes-card p {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.85;
}

/* ─── confetti canvas ─── */
#confetti {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 300;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="petals" id="petals"></div>

<div class="card">
  <span class="emoji-top">🌷</span>

  <h1>Tengo una propuesta<br>para ti</h1>
  <div class="divider"></div>

  <p class="message">
    Algo sin prisa, sin pretexto —<br>
    solo <em>tú, yo</em> y un buen plan:
  </p>

  <div class="plan">
    <div class="plan-row"><span class="dot"></span> Caminar sin destino fijo</div>
    <div class="plan-row"><span class="dot"></span> Perdernos en un museo</div>
    <div class="plan-row"><span class="dot"></span> Un helado, sin excusas</div>
    <div class="plan-row"><span class="dot"></span> Café y conversación larga</div>
  </div>

  <div class="btns">
    <button class="btn-yes" onclick="celebrate()">Sí, me apunto 🌸</button>
    <button class="btn-no" id="noBtn" onmouseover="runAway()" onclick="runAway()">No gracias</button>
  </div>

  <p class="hint" id="hint"></p>
</div>

<div id="overlay">
  <canvas id="confetti"></canvas>
  <div class="yes-card">
    <span class="big">🌷☕</span>
    <h2>¡Ya tenemos plan!</h2>
    <p>Sabía que dirías que sí.<br>Va a ser un día perfecto, te lo prometo.</p>
  </div>
</div>

<script>
/* ── Pétalos flotantes ── */
const petalCont = document.getElementById('petals');
const EMOJIS = ['🌸','🌷','✨','💕','🌺'];
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = EMOJIS[i % EMOJIS.length];
  p.style.left     = Math.random() * 100 + 'vw';
  p.style.fontSize = (12 + Math.random() * 14) + 'px';
  p.style.animationDuration  = (14 + Math.random() * 16) + 's';
  p.style.animationDelay     = -(Math.random() * 20) + 's';
  petalCont.appendChild(p);
}

/* ── Botón "No" que huye ── */
let noFixed = false, escapes = 0;
const noBtn  = document.getElementById('noBtn');
const hint   = document.getElementById('hint');

const msgs = [
  '¿Segura? El botón "Sí" está muy solito… 😏',
  'Ese botón no quiere que lo presionen 😄',
  'El universo conspira en tu contra… o a tu favor 🌷',
  'Sospecho que el "Sí" te espera 💕',
  'Rendirse no es una opción 🌸',
];

function runAway() {
  escapes++;
  if (!noFixed) {
    const r    = noBtn.getBoundingClientRect();
    noBtn.style.cssText = `
      position: fixed;
      margin: 0;
      left: ${r.left}px;
      top:  ${r.top}px;
      padding: 10px 20px;
      background: transparent;
      color: #ccc;
      border: 1px solid rgba(0,0,0,.1);
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
      z-index: 100;
      transition: left .25s cubic-bezier(.22,1,.36,1), top .25s cubic-bezier(.22,1,.36,1);
    `;
    noFixed = true;
    noBtn.getBoundingClientRect(); // reflow
  }

  const pad = 90;
  const bw  = noBtn.offsetWidth  || 110;
  const bh  = noBtn.offsetHeight || 42;
  const nx  = pad + Math.random() * (window.innerWidth  - bw - pad * 2);
  const ny  = pad + Math.random() * (window.innerHeight - bh - pad * 2);
  noBtn.style.left = nx + 'px';
  noBtn.style.top  = ny + 'px';

  // Mensaje de pista
  hint.textContent = msgs[Math.min(escapes - 1, msgs.length - 1)];
  hint.classList.add('show');
}

/* ── Celebrar ── */
function celebrate() {
  document.getElementById('overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const c  = document.getElementById('confetti');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
  const cx = c.getContext('2d');
  const COLORS = ['#d4517a','#e8829f','#ffd4e0','#ffffff','#f9c6d4','#a8304f'];

  const bits = Array.from({ length: 120 }, () => ({
    x:  Math.random() * c.width,
    y: -20 - Math.random() * 200,
    w:  5 + Math.random() * 6,
    h:  8 + Math.random() * 5,
    col: COLORS[Math.floor(Math.random() * COLORS.length)],
    vy: 1.8 + Math.random() * 3.5,
    vx: (Math.random() - .5) * 2.5,
    da: (Math.random() - .5) * .15,
    a:  Math.random() * Math.PI * 2,
  }));

  (function draw() {
    cx.clearRect(0, 0, c.width, c.height);
    let alive = false;
    bits.forEach(b => {
      b.y += b.vy; b.x += b.vx; b.a += b.da;
      if (b.y < c.height + 20) alive = true;
      cx.save();
      cx.globalAlpha = Math.max(0, 1 - b.y / (c.height * 1.1));
      cx.translate(b.x, b.y);
      cx.rotate(b.a);
      cx.fillStyle = b.col;
      cx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
      cx.restore();
    });
    if (alive) requestAnimationFrame(draw);
  })();
}
</script>
</body>
</html>
